<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Cart</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
      }
      .header {
        background: #6a0dad;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
      }
      .header span {
        cursor: pointer;
      }
      .container {
        padding: 20px;
        padding-bottom: 90px;
      }
      .card,
      .item,
      .budget-box {
        background: white;
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 12px;
        box-shadow: 0 3px 6px rgba(0, 0, 0, 0.05);
      }
      .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      button {
        background: #6a0dad;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px;
        cursor: pointer;
      }
      input {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-top: 8px;
      }
      .alert {
        background: #ffe6e6;
        color: #b00020;
        padding: 12px;
        border-radius: 10px;
        margin-top: 10px;
        display: none;
      }
      .total {
        font-weight: bold;
        font-size: 18px;
        margin-top: 15px;
      }
      .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: white;
        text-align: center;
        padding: 10px;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="header">
      <span onclick="location.href = 'home.php'">⬅️ Home</span>
      <div>My Cart</div>
      <div></div>
    </div>

    <div class="container">
      <div class="budget-box">
        <h3>Set Your Budget</h3>
        <input
          type="number"
          id="budgetInput"
          placeholder="Enter budget in OMR"
        />
        <br /><br />
        <button onclick="saveBudget()">Save Budget</button>
        <p id="savedBudget"></p>
        <div id="budgetAlert" class="alert">
          ⚠️ Your cart total exceeded your budget!
        </div>
      </div>

      <h3>Products</h3>

      <div class="item">
        <span>Milk - 1.5 OMR</span>
        <button onclick="addToCart('Milk', 1.5)">Add</button>
      </div>

      <div class="item">
        <span>Bread - 0.8 OMR</span>
        <button onclick="addToCart('Bread', 0.8)">Add</button>
      </div>

      <div class="item">
        <span>Rice - 3.2 OMR</span>
        <button onclick="addToCart('Rice', 3.2)">Add</button>
      </div>

      <div class="item">
        <span>Juice - 1.1 OMR</span>
        <button onclick="addToCart('Juice', 1.1)">Add</button>
      </div>

      <div class="card">
        <h3>Cart Items</h3>
        <div id="cartItems"></div>
        <div class="total">Total: <span id="total">0.00</span> OMR</div>
        <br />
        <button onclick="location.href = 'checkout.php'">Checkout</button>
      </div>
    </div>

    <div class="footer">SmartCart | support@smartcart.com</div>

    <script>
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let budget = localStorage.getItem("budget") || "";

      function saveBudget() {
        let value = document.getElementById("budgetInput").value;

        if (value === "" || value <= 0) {
          alert("Please enter a valid budget");
          return;
        }

        budget = value;
        localStorage.setItem("budget", budget);
        showBudget();
        checkBudget();
      }

      function showBudget() {
        if (budget) {
          document.getElementById("savedBudget").innerText =
            "Your budget: " + budget + " OMR";
          document.getElementById("budgetInput").value = budget;
        }
      }

      function addToCart(name, price) {
        let currentTotal = getTotal();
        let newTotal = currentTotal + price;

        if (budget && newTotal > Number(budget)) {
          document.getElementById("budgetAlert").style.display = "block";
          alert("⚠️ This product exceeds your budget!");
          return;
        }

        cart.push({ name: name, price: price });
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      }

      function getTotal() {
        return cart.reduce((sum, item) => sum + item.price, 0);
      }

      function renderCart() {
        let cartItems = document.getElementById("cartItems");
        cartItems.innerHTML = "";

        cart.forEach((item, index) => {
          cartItems.innerHTML += `
      <p>${item.name} - ${item.price} OMR 
      <button onclick="removeItem(${index})">Remove</button></p>
    `;
        });

        document.getElementById("total").innerText = getTotal().toFixed(2);
        checkBudget();
      }

      function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      }

      function checkBudget() {
        let alertBox = document.getElementById("budgetAlert");

        if (budget && getTotal() > Number(budget)) {
          alertBox.style.display = "block";
        } else {
          alertBox.style.display = "none";
        }
      }

      showBudget();
      renderCart();
    </script>
  </body>
</html>
