<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Store Map</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
      }
      .header {
        background: #6a0dad;
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
      }
      .header span {
        cursor: pointer;
      }
      .container {
        padding: 20px;
        padding-bottom: 80px;
      }
      .map-box iframe {
        width: 100%;
        height: 350px;
        border: 0;
        border-radius: 15px;
      }
      .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: white;
        text-align: center;
        padding: 10px;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="header">
      <span onclick="location.href = 'home.php'">⬅️ Home</span>
      <div>Store Map</div>
      <div></div>
    </div>

    <div class="container">
      <h3>Find Our Store</h3>

      <div class="map-box">
        <iframe
          src="https://www.google.com/maps?q=Lulu%20Hypermarket%20Sohar%20Oman&output=embed"
          allowfullscreen
          loading="lazy"
        >
        </iframe>
      </div>
    </div>

    <div class="footer">SmartCart | support@smartcart.com</div>
  </body>
</html>
